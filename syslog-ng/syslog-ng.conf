@version: 3.38
@include "scl.conf"

options {
    chain_hostnames(no);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    owner("root");
    group("root");
    perm(0644);
    stats_freq(0);
    bad_hostname("^gconfd$");
};

source s_local {
    system();
    internal();
};

source s_network {
    udp(ip(0.0.0.0) port(514));
};

filter f_auth {
    facility(auth, authpriv);
};

filter f_syslog {
    not facility(auth, authpriv);
};

destination d_remote {
    file("/var/log/remotos/${HOST}.log");
};

destination d_remote_auth_hosts {
    file("/var/log/remotos/${HOST}/auth.log" create_dirs(yes) dir_perm(0755) perm(0644));
};

destination d_remote_syslog_hosts {
    file("/var/log/remotos/${HOST}/syslog.log" create_dirs(yes) dir_perm(0755) perm(0644));
};

log {
    source(s_network);
    destination(d_remote);
};

log {
    source(s_network);
    filter(f_auth);
    destination(d_remote_auth_hosts);
};

log {
    source(s_network);
    filter(f_syslog);
    destination(d_remote_syslog_hosts);
};

log {
    source(s_local);
    destination(d_remote);
};